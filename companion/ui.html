<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Presence Discord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKENS — palette zinc + cyan only
    ───────────────────────────────────────── */
    :root {
      --bg:       #1e1e1e;
      --card:     #111113;
      --card2:    #18181b;
      --border:   rgba(255,255,255,.08);
      --border-h: rgba(255,255,255,.14);
      --text:     #ffffff;
      --muted:    #a1a1aa;
      --muted2:   #71717a;
      --dim:      #52525b;
      --accent:   #22d3ee;
      --accent2:  #06b6d4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 390px; height: 340px;
      background: var(--bg); color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px; overflow: hidden;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ─────────────────────────────────────────
       ANIMATIONS — fade + slide-up 16px, 0.4s easeOut
    ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .a { animation: fadeUp .4s ease-out var(--d, 0s) both; }

    @keyframes vinyl-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes draw-arc {
      0%   { stroke-dashoffset: 314; opacity: .45; }
      50%  { stroke-dashoffset: 0;   opacity: .9; }
      100% { stroke-dashoffset: -314; opacity: .45; }
    }
    @keyframes tonearm-bob {
      0%, 100% { transform: rotate(-2deg); }
      50%      { transform: rotate(1.5deg); }
    }

    /* ─────────────────────────────────────────
       CARD BASE — rounded-3xl + border + inset glow
    ───────────────────────────────────────── */
    .card {
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.03);
      transition: border-color .2s ease;
    }
    .card:hover { border-color: var(--border-h); }

    /* ─────────────────────────────────────────
       TITLEBAR — Windows style
    ───────────────────────────────────────── */
    .tb {
      height: 32px; flex: none;
      display: flex; align-items: center;
      background: #202020;
      border-bottom: 1px solid rgba(255,255,255,.05);
      -webkit-app-region: drag;
    }
    .tb-brand {
      display: flex; align-items: center; gap: 8px;
      padding: 0 0 0 10px;
      font-size: 12px; font-weight: 400; color: rgba(255,255,255,.8);
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden;
    }
    .tb-brand img { width: 16px; height: 16px; border-radius: 3px; opacity: .85; flex: none; }

    /* Status — dots uniquement */
    .tb-status {
      display: flex; align-items: center; gap: 8px;
      padding: 0 10px;
      -webkit-app-region: no-drag;
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #3f3f46; flex: none;
      transition: background .4s, box-shadow .4s;
    }
    .sdot.on { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,.7); }

    /* Windows-style control buttons */
    .win-controls {
      display: flex; height: 100%;
      -webkit-app-region: no-drag;
    }
    .win-btn {
      width: 40px; height: 100%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: transparent;
      border: none; color: rgba(255,255,255,.65);
      transition: background .1s;
    }
    .win-btn svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .win-btn:hover { background: rgba(255,255,255,.08); color: #fff; }
    .win-btn:active { background: rgba(255,255,255,.16); }
    .win-btn-close:hover { background: #c42b1c; color: #fff; }
    .win-btn-max { opacity: .3; cursor: default; }
    .win-btn-max:hover { background: transparent; color: rgba(255,255,255,.65); }

    /* ─────────────────────────────────────────
       BODY
    ───────────────────────────────────────── */
    .body {
      flex: 1; display: flex; flex-direction: column;
      padding: 20px; gap: 16px; overflow: hidden;
    }

    /* ─────────────────────────────────────────
       CARTE MÉDIA — backdrop cinématique
    ───────────────────────────────────────── */
    .media-card {
      height: 160px; flex: none;
      position: relative; overflow: hidden;
      border-radius: 8px;
      border-color: rgba(255,255,255,.06);
    }

    /* Fond flou issu du poster — clippé par overflow:hidden du card */
    .media-backdrop {
      position: absolute; inset: -22px;
      background-size: cover; background-position: center;
      filter: blur(22px) saturate(.45) brightness(.5);
      opacity: 0; transition: opacity .85s ease;
    }
    .media-backdrop.on { opacity: 1; }

    /* Vignettage multi-directionnel */
    .media-vignette {
      position: absolute; inset: 0; z-index: 1;
      background:
        linear-gradient(to bottom, rgba(17,17,19,.6) 0%,  transparent 30%),
        linear-gradient(to top,    rgba(17,17,19,.98) 0%, transparent 55%),
        linear-gradient(to right,  rgba(17,17,19,.18) 0%, transparent 40%),
        linear-gradient(to left,   rgba(17,17,19,.18) 0%, transparent 40%);
    }

    /* ── État idle — vinyl record ── */
    .np-idle {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 0; text-align: center; padding: 0 28px;
    }

    /* Vinyl container — disc + arc + tonearm stacked */
    .vinyl-wrap {
      position: relative; width: 108px; height: 108px;
      flex: none; margin-bottom: 10px;
    }
    .vinyl-arc-svg {
      position: absolute; inset: 0; width: 108px; height: 108px;
    }
    .vinyl-arc-line {
      transform-origin: 54px 54px; transform: rotate(-90deg);
      animation: draw-arc 4s ease-in-out infinite;
    }
    .vinyl-disc {
      position: absolute; top: 10px; left: 10px;
      width: 88px; height: 88px; border-radius: 50%;
      background:
        conic-gradient(from 0deg, transparent 0%, rgba(255,255,255,.055) 15%,
          rgba(255,255,255,.018) 28%, transparent 38%),
        repeating-radial-gradient(circle at center,
          rgba(255,255,255,.022) 0, rgba(255,255,255,.022) .7px,
          transparent .7px, transparent 4px),
        #141417;
      animation: vinyl-spin 10s linear infinite;
    }
    .vinyl-label {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 30px; height: 30px; border-radius: 50%;
      background: radial-gradient(circle, #27272a 0%, #1c1c1f 100%);
      border: 1px solid rgba(255,255,255,.1);
      display: grid; place-items: center;
    }
    .vinyl-hole {
      width: 6px; height: 6px; border-radius: 50%;
      background: #09090b;
      box-shadow: 0 0 0 1px rgba(255,255,255,.12);
    }
    .tonearm-svg {
      position: absolute; width: 44px; height: 70px;
      top: -6px; right: -4px; z-index: 2;
      animation: tonearm-bob 5s ease-in-out infinite;
      transform-origin: 9px 11px;
    }
    /* Typographie idle */
    .idle-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .idle-sites  { font-size: 10px; color: var(--dim); line-height: 1.65; }

    /* ── État actif ── */
    .np-active {
      position: relative; z-index: 2;
      display: none; flex-direction: column;
      height: 100%; padding: 10px 14px 8px;
      justify-content: flex-start; gap: 6px;
    }

    /* Label plateforme + badge — ligne du haut */
    .np-meta { display: flex; align-items: center; justify-content: space-between; }

    .np-platform {
      font-size: 9px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--accent);
    }

    .np-badge {
      font-size: 9px; font-weight: 600;
      padding: 2px 9px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.1); line-height: 1.6;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .np-badge.playing { background: rgba(255,255,255,.06); color: var(--muted); }
    .np-badge.paused  { background: transparent;           color: var(--dim);   border-color: rgba(255,255,255,.06); }
    .np-badge.live    {
      background: rgba(239,68,68,.08);
      border-color: rgba(239,68,68,.25);
      color: #fca5a5;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
      60%      { opacity: .7; box-shadow: 0 0 0 4px rgba(239,68,68,0); }
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; flex: none;
      background: #ef4444;
      animation: pulse-live 1.4s ease-in-out infinite;
    }

    /* Rangée principale */
    .np-row { display: flex; gap: 12px; align-items: flex-start; }
    .np-info-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
    .np-prog { }

    .np-poster {
      width: 72px; height: 108px; object-fit: cover; object-position: center; flex: none; display: block;
      border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
    }

    .np-info { display: flex; flex-direction: column; gap: 8px; }

    /* Hiérarchie typographique */
    .np-title {
      font-size: 14px; font-weight: 700; line-height: 1.2; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .np-eptitle {
      font-size: 11px; font-weight: 500; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .np-episode {
      font-size: 10px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Cachés, conservés pour compatibilité JS */
    .np-state { display: none; }
    .np-poster-wrap { display: contents; }

    /* Barre de progression */
    .prog-track {
      height: 2px; background: rgba(255,255,255,.08);
      border-radius: 2px; overflow: hidden;
    }
    .prog-fill { height: 100%; border-radius: 2px; width: 0; transition: width .9s linear; }
    .prog-fill.playing { background: rgba(255,255,255,.7); }
    .prog-fill.paused  { background: rgba(255,255,255,.2); }
    .prog-times {
      display: flex; justify-content: space-between;
      font-size: 9px; color: var(--muted2); margin-top: 5px;
      font-variant-numeric: tabular-nums; letter-spacing: .02em;
    }

    /* ─────────────────────────────────────────
       TERMINAL LOGS — style site (pur terminal, sans header)
    ───────────────────────────────────────── */
    .logs {
      height: 90px; flex: none;
      background: #0c0c0c;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    .logs-body {
      height: 100%; overflow-y: auto;
      padding: 10px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 10px; line-height: 1.85; color: #cccccc;
    }
    .logs-body::-webkit-scrollbar { width: 3px; }
    .logs-body::-webkit-scrollbar-track { background: transparent; }
    .logs-body::-webkit-scrollbar-thumb { background: rgba(63,63,70,.5); border-radius: 2px; }
    @keyframes logFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .log-line {
      white-space: pre; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
      opacity: 0;
      animation: logFadeIn 0.3s forwards;
    }
  </style>
</head>
<body>

  <!-- Titlebar — Windows style -->
  <div class="tb">
    <div class="tb-brand">
      Presence Companion
    </div>
    <div class="tb-status">
      <div class="sdot" id="wsDot" title="WebSocket"></div>
      <div class="sdot" id="discDot" title="Discord"></div>
    </div>
    <div class="win-controls">
      <button class="win-btn" id="btnMinimize" title="Réduire">
        <svg viewBox="0 0 10 1"><path d="M0 0h10" stroke-width="1.2"/></svg>
      </button>
      <button class="win-btn win-btn-max" title="Agrandir" disabled>
        <svg viewBox="0 0 10 10"><rect x=".5" y=".5" width="9" height="9" rx=".5" stroke-width="1"/></svg>
      </button>
      <button class="win-btn win-btn-close" id="btnClose" title="Fermer">
        <svg viewBox="0 0 10 10"><path d="M0 0l10 10M10 0L0 10" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <div class="body">

    <!-- Carte média -->
    <div class="card media-card a" style="--d:.04s">
      <div class="media-backdrop" id="npBackdrop"></div>
      <div class="media-vignette"></div>

      <!-- Idle — vinyl record player -->
      <div class="np-idle" id="npIdle">
        <div class="vinyl-wrap">
          <svg class="vinyl-arc-svg" viewBox="0 0 108 108" fill="none">
            <circle cx="54" cy="54" r="50" stroke="rgba(255,255,255,0.05)"
              stroke-width="1" stroke-dasharray="3 6"/>
            <circle cx="54" cy="54" r="50" stroke="rgba(255,255,255,.4)" stroke-width="1.5"
              stroke-dasharray="314" stroke-linecap="round" class="vinyl-arc-line"/>
          </svg>
          <div class="vinyl-disc">
            <div class="vinyl-label">
              <div class="vinyl-hole"></div>
            </div>
          </div>
          <svg class="tonearm-svg" viewBox="0 0 44 70" fill="none">
            <circle cx="9" cy="11" r="5.5" fill="#27272a" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
            <circle cx="9" cy="11" r="2" fill="rgba(255,255,255,.25)"/>
            <rect x="7.5" y="14" width="3" height="40" rx="1.5" fill="#3f3f46" transform="rotate(8 9 14)"/>
            <rect x="6" y="51" width="6" height="10" rx="2" fill="#27272a" stroke="rgba(255,255,255,.15)" stroke-width=".75" transform="rotate(8 9 14)"/>
            <line x1="9" y1="59" x2="9.5" y2="65" stroke="rgba(255,255,255,.5)" stroke-width="1" stroke-linecap="round" transform="rotate(8 9 14)"/>
          </svg>
        </div>
        <div class="idle-title">Aucun média en cours</div>
      </div>

      <!-- Actif -->
      <div class="np-active" id="npActive">
        <div class="np-meta">
          <span class="np-platform" id="npPlatform"></span>
          <span class="np-badge"    id="npBadge"></span>
        </div>
        <div class="np-row">
          <img class="np-poster" id="npPoster" alt="">
          <div class="np-poster-wrap" style="display:none"></div>
          <div class="np-info-wrap">
            <div class="np-info">
              <div class="np-title"   id="npTitle"></div>
              <div class="np-eptitle" id="npEpTitle" style="display:none"></div>
              <div class="np-episode" id="npEpisode" style="display:none"></div>
            </div>
            <div class="np-prog">
              <div class="prog-track"><div class="prog-fill" id="npBar"></div></div>
              <div class="prog-times"><span id="npCurrent">0:00</span><span id="npDuration">0:00</span></div>
            </div>
          </div>
        </div>
        <div class="np-state" id="npState"></div>
      </div>
    </div>

    <!-- Terminal logs -->
    <div class="logs a" style="--d:.12s">
      <div class="logs-body" id="logsScroll"></div>
    </div>

  </div>

  <script>
  const ANSI = {
    "0":"","90":"#52525b","97":"#ffffff","92":"#22c55e","91":"#ef4444",
    "93":"#f59e0b","96":"#22d3ee","38;5;99":"#8b5cf6","38;5;203":"#f97066",
  };
  function ansiToHtml(t) {
    let o="",i=0,open=false;
    while(i<t.length){
      if(t.charCodeAt(i)===27&&t[i+1]==="["){
        let j=i+2; while(j<t.length&&t[j]!=="m")j++;
        const c=t.slice(i+2,j);
        if(open){o+="</span>";open=false;}
        const col=ANSI[c];
        if(col){o+=`<span style="color:${col}">`;open=true;}
        i=j+1;continue;
      }
      const ch=t[i];
      o+=ch==="&"?"&amp;":ch==="<"?"&lt;":ch===">"?"&gt;":ch;
      i++;
    }
    if(open)o+="</span>";
    return o;
  }

  const $ = id => document.getElementById(id);

  function fmtTime(s) {
    s=Math.floor(s||0);
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
    const p=n=>String(n).padStart(2,"0");
    return h>0?`${h}:${p(m)}:${p(sec)}`:`${m}:${p(sec)}`;
  }

  const logsEl=$("logsScroll");

  function appendLog(raw) {
    const d=document.createElement("div");
    d.className="log-line";
    const now=new Date();
    const t=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
    d.innerHTML=`<span style="color:#569cd6">[${t}]</span> ${ansiToHtml(raw.trimEnd())}`;
    logsEl.prepend(d);
    while(logsEl.children.length>200)logsEl.removeChild(logsEl.lastChild);
  }


  let PLATFORM={};

  let syncedPayload=null,syncedAt=0,lastSec=-1;

  function liveTime(){
    if(!syncedPayload?.isPlaying)return syncedPayload?.currentTime||0;
    if(syncedPayload.isLive)return(syncedPayload.currentTime||0)+(Date.now()-syncedAt)/1000;
    return Math.min((syncedPayload.currentTime||0)+(Date.now()-syncedAt)/1000,syncedPayload.duration||0);
  }

  (function tick(){
    const p=syncedPayload;
    if(p?.isPlaying){
      const cur=liveTime(),sec=Math.floor(cur);
      if(sec!==lastSec){
        lastSec=sec;
        if(p.isLive){
          const el=p.liveStartAt?Math.floor((Date.now()-p.liveStartAt)/1000):sec;
          $("npCurrent").textContent=fmtTime(el);
        } else {
          $("npCurrent").textContent=fmtTime(cur);
          const dur=p.duration||0;
          $("npBar").style.width=dur?Math.min(100,cur/dur*100)+"%":"0%";
        }
      }
    }
    requestAnimationFrame(tick);
  })();

  function renderState(s){
    if(!s)return;
    if(Array.isArray(s.platforms))PLATFORM=Object.fromEntries(s.platforms.map(p=>[p.type,p.name]));
    $("wsDot").className="sdot"+(s.wsConnected?" on":"");
    $("discDot").className="sdot"+(s.discConnected?" on":"");
    const p=s.payload,bd=$("npBackdrop");
    if(!p){
      syncedPayload=null;
      $("npIdle").style.display="";
      $("npActive").style.display="none";
      bd.style.backgroundImage="none";bd.classList.remove("on");
      return;
    }
    $("npIdle").style.display="none";
    $("npActive").style.display="flex";
    const isLive=!!p.isLive;
    syncedPayload=p;syncedAt=p.timestamp||Date.now();lastSec=-1;
    if(p.poster){bd.style.backgroundImage=`url("${p.poster}")`;bd.classList.add("on");}
    else{bd.style.backgroundImage="none";bd.classList.remove("on");}
    const platEl=$("npPlatform");
    platEl.textContent=PLATFORM[p.type]||"Cinepulse";platEl.className="np-platform";
    const poster=$("npPoster");
    poster.src=p.poster||"";poster.style.display=p.poster?"":"none";
    poster.className="np-poster";
    const badge=$("npBadge");
    badge.className="np-badge "+(isLive?"live":p.isPlaying?"playing":"paused");
    if(isLive){
      badge.innerHTML='<span class="live-dot"></span>En direct';
    } else {
      badge.textContent=p.isPlaying?"En lecture":"En pause";
    }
    $("npState").className="np-state "+(p.isPlaying?"playing":"paused");
    $("npTitle").textContent=p.seriesTitle||p.movieTitle||p.videoTitle||p.title||"";
    const epTitleEl=$("npEpTitle");
    const epTitleText=p.streamTitle||(p.contentType==="series"?p.episodeTitle:null);
    if(epTitleText){epTitleEl.textContent=epTitleText;epTitleEl.style.display="";}
    else epTitleEl.style.display="none";
    const epEl=$("npEpisode");
    if(p.contentType==="series"&&p.season!=null&&p.episodeNum!=null){
      epEl.textContent=`Saison ${p.season} · Épisode ${p.episodeNum}`;epEl.style.display="";
    } else if(p.channel){epEl.textContent=p.channel;epEl.style.display="";}
    else epEl.style.display="none";
    $("npBar").className="prog-fill "+(p.isPlaying?"playing":"paused");
    if(isLive){
      const el=p.liveStartAt?Math.floor((Date.now()-p.liveStartAt)/1000):0;
      $("npCurrent").textContent=fmtTime(el);$("npDuration").textContent="En direct";$("npBar").style.width="0%";
    } else {
      const pct=p.duration>0?Math.min(100,p.currentTime/p.duration*100):0;
      $("npBar").style.width=pct+"%";
      $("npCurrent").textContent=fmtTime(p.currentTime);$("npDuration").textContent=fmtTime(p.duration);
    }
  }

  window.electronAPI.onLogs(logs=>logs.forEach(appendLog));
  window.electronAPI.onLog(line=>appendLog(line));
  window.electronAPI.onState(s=>renderState(s));
  $("btnClose").addEventListener("click",()=>window.electronAPI.closeWindow());
  $("btnMinimize").addEventListener("click",()=>window.electronAPI.minimizeWindow());
  </script>
</body>
</html>
